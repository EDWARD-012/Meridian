{% extends "base.html" %}
{% block title %}Register · Meridian{% endblock %}
{% block content %}
<form method="post" class="form-box">
  {% csrf_token %}
  <h2>Create account</h2>
  {% for field in form %}
  <div class="field">
    <label>{{ field.label }}</label>
    {{ field }}
    {{ field.errors }}
  </div>
  {% endfor %}
  <button type="submit" class="btn btn-primary" style="width:100%">Sign up</button>
  <p class="form-note">Already registered? <a href="{% url 'login' %}">Login</a></p>
</form>
{% endblock %}
